<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>login</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #1a1a2e;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
.box {
  background: #16213e;
  padding: 40px 36px;
  border-radius: 12px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.4);
  text-align: center;
  max-width: 340px;
  width: 90%;
}
h2 {
  color: #e0e0e0;
  margin-bottom: 24px;
  font-size: 20px;
  font-weight: 500;
  letter-spacing: 1px;
}
input {
  width: 100%;
  padding: 12px 16px;
  border: 1px solid #2a3a5c;
  border-radius: 8px;
  background: #0f3460;
  color: #e0e0e0;
  font-size: 15px;
  outline: none;
  transition: border-color .2s;
}
input:focus { border-color: #4a9eff; }
button {
  width: 100%;
  margin-top: 16px;
  padding: 12px;
  background: #e94560;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  cursor: pointer;
  transition: background .2s;
}
button:hover { background: #d63851; }
.err {
  color: #e94560;
  font-size: 13px;
  margin-top: 12px;
  min-height: 20px;
}
</style>
</head>
<body>
<div class="box">
  <h2>Enter Password</h2>
  <input type="password" id="pwd" placeholder="password" autofocus>
  <button onclick="verify()">Login</button>
  <div class="err" id="err"></div>
</div>
<script>
const HASH = '0007de391dcd229cf83089ba12d7fa06560aa0c617265cd9bab9c86b10636b43';

async function sha256(text) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function verify() {
  const input = document.getElementById('pwd').value;
  const err = document.getElementById('err');
  if (!input) { err.textContent = 'please enter password'; return; }
  const h = await sha256(input);
  if (h === HASH) {
    sessionStorage.setItem('blog_auth', 'true');
    window.location.href = '/blog/';
  } else {
    err.textContent = 'wrong password';
  }
}

document.getElementById('pwd').addEventListener('keydown', e => {
  if (e.key === 'Enter') verify();
});
</script>
</body>
</html>
